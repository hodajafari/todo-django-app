{% extends 'tasks/base.html' %}

{% block content %}

<h2 class="mb-4">My Tasks</h2>

<form method="get" class="mb-3">
<div class="input-group">
<input type="text" name="search" class="form-control"
value="{{ request.GET.search }}" placeholder="Search task">
<button class="btn btn-secondary">Search</button>
</div>
</form>

<form method="post" action="{% url 'create_task' %}" class="mb-4">
{% csrf_token %}

<input class="form-control" type="text" name="title" placeholder="New Task" required autofocus>

<button class="btn btn-primary mt-2">
Add Task
</button>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item d-flex justify-content-between">

<div>

{% if task.completed %}
<s>{{ task.title }}</s>✔
{% else %}
{{ task.title }}
{% endif %}

</div>

<div class="d-flex gap-2">

<a class="btn btn-sm btn-success"
href="{% url 'toggle_complete' task.id %}">
Done
</a>

<a class="btn btn-sm btn-info"
href="{% url 'edit_task' task.id %}">
Edit
</a>

<a class="btn btn-sm btn-danger"
href="{% url 'delete_task' task.id %}">
Delete
</a>

</div>

</li>

{% empty %}

<li class="list-group-item text-center">
No tasks found
</li>

{% endfor %}

</ul>

{% endblock %}
